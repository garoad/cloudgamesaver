name: "Publish Release"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target universal-apple-darwin"
          - platform: "ubuntu-22.04"
            args: "--bundles appimage"
          - platform: "windows-latest"
            args: "--bundles nsis"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APP_KEY: ${{ secrets.APP_KEY }}
          APP_SECRET: ${{ secrets.APP_SECRET }}
        with:
          tagName: v__VERSION__
          releaseName: "CloudGameSaver v__VERSION__"
          releaseBody: "자동으로 빌드된 릴리즈입니다."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  updater:
    needs: publish-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install tauri-cli
        run: npm install -g @tauri-apps/cli

      - name: Get Version
        id: get_version
        run: |
          echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Wait for Release Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          TAG_NAME="v$VERSION"
          echo "Waiting for assets to be ready in release $TAG_NAME..."
          sleep 60 # 릴리즈 자산이 깃허브 서버에 완전히 전파될 때까지 대기

      - name: Generate latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          TAG_NAME="v$VERSION"
          
          mkdir -p assets
          # 릴리즈에서 모든 자산 목록 가져오기 및 다운로드
          gh release download $TAG_NAME --dir assets --clobber
          
          echo "Downloaded assets list:"
          ls assets

          # 각 플랫폼별 실제 파일명 추출 (더 유연한 매칭)
          WIN_FILE=$(ls assets | grep -i "\.nsis\.zip$" | head -n 1 || echo "")
          LINUX_FILE=$(ls assets | grep -i "\.AppImage\.tar\.gz$" | head -n 1 || echo "")
          MAC_ARM_FILE=$(ls assets | grep -i "aarch64\.app\.tar\.gz$" | head -n 1 || echo "")
          MAC_X64_FILE=$(ls assets | grep -i "x64\.app\.tar\.gz$" | head -n 1 || echo "")

          # 서명 파일(.sig) 매칭
          WIN_SIG=$(cat assets/$WIN_FILE.sig 2>/dev/null || echo "")
          LINUX_SIG=$(cat assets/$LINUX_FILE.sig 2>/dev/null || echo "")
          MAC_ARM_SIG=$(cat assets/$MAC_ARM_FILE.sig 2>/dev/null || echo "")
          MAC_X64_SIG=$(cat assets/$MAC_X64_FILE.sig 2>/dev/null || echo "")

          # URL 생성 (파일이 존재할 때만 생성)
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/$TAG_NAME"
          
          # JSON 빌드 (빈 파일 예외 처리 포함)
          JSON_CONTENT=$(cat <<EOF
          {
            "version": "$VERSION",
            "notes": "CloudGameSaver $VERSION 업데이트가 준비되었습니다.",
            "pub_date": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "platforms": {}
          }
          EOF
          )

          # 플랫폼 정보 동적 추가
          if [ -n "$WIN_FILE" ]; then
            JSON_CONTENT=$(echo \$JSON_CONTENT | jq ".platforms[\"windows-x86_64\"] = {\"signature\": \"$WIN_SIG\", \"url\": \"$BASE_URL/$WIN_FILE\"}")
          fi
          if [ -n "$LINUX_FILE" ]; then
            JSON_CONTENT=$(echo \$JSON_CONTENT | jq ".platforms[\"linux-x86_64\"] = {\"signature\": \"$LINUX_SIG\", \"url\": \"$BASE_URL/$LINUX_FILE\"}")
          fi
          if [ -n "$MAC_ARM_FILE" ]; then
            JSON_CONTENT=$(echo \$JSON_CONTENT | jq ".platforms[\"darwin-aarch64\"] = {\"signature\": \"$MAC_ARM_SIG\", \"url\": \"$BASE_URL/$MAC_ARM_FILE\"}")
          fi
          if [ -n "$MAC_X64_FILE" ]; then
            JSON_CONTENT=$(echo \$JSON_CONTENT | jq ".platforms[\"darwin-x86_64\"] = {\"signature\": \"$MAC_X64_SIG\", \"url\": \"$BASE_URL/$MAC_X64_FILE\"}")
          fi

          echo \$JSON_CONTENT > latest.json
          
          echo "Generated latest.json content:"
          cat latest.json
          
          gh release upload $TAG_NAME latest.json --clobber
