name: "Auto Release & Update"

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - ".gitignore"
      - "LICENSE"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows-latest"
            target: "x86_64-pc-windows-msvc"
            os-name: "windows-x86_64"
            artifact-name: "CloudGameSaver.exe"
          - platform: "ubuntu-22.04" 
            target: "x86_64-unknown-linux-gnu"
            os-name: "linux-x86_64"
            artifact-name: "CloudGameSaver"
          - platform: "macos-latest"
            target: "universal-apple-darwin"
            os-name: "darwin-universal"
            artifact-name: "CloudGameSaver.app"

    runs-on: ${{ matrix.platform }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      
    steps:
      - uses: actions/checkout@v4

      - name: Get Version
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      # Node.js 캐싱
      - name: Setup Node.js with cache
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      # Rust 캐싱  
      - name: Setup Rust with cache
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      # Linux 종속성
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # 프론트엔드 종속성 설치
      - name: Install dependencies
        run: npm ci

      # Tauri 빌드 및 릴리스
      - uses: tauri-apps/tauri-action@v0
        id: tauri-build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APP_KEY: ${{ secrets.APP_KEY }}
          APP_SECRET: ${{ secrets.APP_SECRET }}
        with:
          tagName: "v${{ steps.version.outputs.version }}"
          releaseName: "CloudGameSaver v${{ steps.version.outputs.version }}"
          releaseBody: |
            ## 🚀 CloudGameSaver v${{ steps.version.outputs.version }}
            
            자동으로 빌드된 최신 릴리스입니다.
            
            ### 📥 다운로드
            - Windows: CloudGameSaver.exe (Portable)
            - Linux: CloudGameSaver.AppImage  
            - macOS: CloudGameSaver.app.tar.gz (자동 업데이트용) / CloudGameSaver.dmg (설치용)
            
            ### 🔄 자동 업데이트
            이전 버전 사용자는 앱 내에서 자동 업데이트가 가능합니다.
          releaseDraft: true
          prerelease: false
          args: "--target ${{ matrix.target }}"
          includeDebug: false
          includeRelease: true
          includeUpdaterJson: false

      # Windows NSIS 설치 프로그램 및 서명 파일 추출 및 업로드 (자동 업데이트용)
      - name: Extract and Upload Windows NSIS Installer
        if: matrix.platform == 'windows-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $VERSION = "${{ steps.version.outputs.version }}"
          $TAG_NAME = "v$VERSION"
          
          # NSIS 설치 프로그램 찾기 (자동 업데이트용으로 서명됨)
          $NSIS_PATTERN = "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*setup.exe"
          $SetupFiles = Get-ChildItem -Path $NSIS_PATTERN -ErrorAction SilentlyContinue
          
          if ($SetupFiles) {
            $SetupFile = $SetupFiles[0]
            Write-Host "✅ Found Windows NSIS installer: $($SetupFile.FullName)"
            
            # 파일 크기 확인
            $FileSize = (Get-Item $SetupFile.FullName).Length / 1MB
            Write-Host "📦 File size: $([math]::Round($FileSize, 2)) MB"
            
            # CloudGameSaver.exe로 복사 (자동 업데이트용 파일명)
            Copy-Item $SetupFile.FullName "CloudGameSaver.exe"
            
            # GitHub Release에 업로드
            gh release upload $TAG_NAME "CloudGameSaver.exe" --clobber
            Write-Host "✅ Successfully uploaded CloudGameSaver.exe (NSIS installer for auto-updater)"
            
            # 서명 파일 찾기 및 업로드 (같은 이름의 .sig 파일)
            $SigFile = "$($SetupFile.FullName).sig"
            
            if (Test-Path $SigFile) {
              Copy-Item $SigFile "CloudGameSaver.exe.sig"
              gh release upload $TAG_NAME "CloudGameSaver.exe.sig" --clobber
              Write-Host "✅ Successfully uploaded signature file for auto-updater"
            } else {
              Write-Host "❌ Error: Signature file not found at: $SigFile"
              Write-Host "📂 Looking for alternative signature files..."
              $AltSigPattern = "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.sig"
              $AltSigFiles = Get-ChildItem -Path $AltSigPattern -ErrorAction SilentlyContinue
              if ($AltSigFiles) {
                Copy-Item $AltSigFiles[0].FullName "CloudGameSaver.exe.sig"
                gh release upload $TAG_NAME "CloudGameSaver.exe.sig" --clobber
                Write-Host "✅ Successfully uploaded alternative signature file"
              } else {
                Write-Host "❌ No signature files found, auto-update will fail"
                exit 1
              }
            }
          } else {
            Write-Host "❌ Windows NSIS installer not found"
            Write-Host "📂 Available files:"
            Get-ChildItem "src-tauri/target" -Recurse -Name "*.exe" | Out-Host
            exit 1
          }
          
          # Portable .exe도 별도로 업로드 (수동 다운로드용)
          $PORTABLE_EXE = "src-tauri/target/x86_64-pc-windows-msvc/release/CloudGameSaver.exe"
          if (Test-Path $PORTABLE_EXE) {
            Write-Host "📦 Also uploading portable executable for manual download..."
            gh release upload $TAG_NAME "$PORTABLE_EXE" --clobber --repo ${{ github.repository }}
            Write-Host "✅ Portable executable uploaded as extra asset"
          }

      # macOS App 처리 및 서명 파일 추출
      - name: Extract and Upload macOS App Bundle
        if: matrix.platform == 'macos-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG_NAME="v$VERSION"
          
          echo "🔍 Looking for macOS App bundle files..."
          
          # .app.tar.gz 파일 찾기 (업데이트용)
          APP_TAR_PATH=$(find src-tauri/target -name "*.app.tar.gz" -type f | head -1)
          
          if [ -n "$APP_TAR_PATH" ] && [ -f "$APP_TAR_PATH" ]; then
            echo "✅ Found macOS App bundle: $APP_TAR_PATH"
            
            # 파일 크기 확인
            ls -lh "$APP_TAR_PATH"
            
            # CloudGameSaver.app.tar.gz로 복사 (업데이트용)
            cp "$APP_TAR_PATH" "CloudGameSaver.app.tar.gz"
            
            # GitHub Release에 업로드
            gh release upload "$TAG_NAME" "CloudGameSaver.app.tar.gz" --clobber
            echo "✅ Successfully uploaded CloudGameSaver.app.tar.gz"
            
            # 서명 파일 찾기
            SIG_PATH=$(find src-tauri/target -name "*.app.tar.gz.sig" -type f | head -1)
            
            if [ -n "$SIG_PATH" ] && [ -f "$SIG_PATH" ]; then
              cp "$SIG_PATH" "CloudGameSaver.app.tar.gz.sig"
              gh release upload "$TAG_NAME" "CloudGameSaver.app.tar.gz.sig" --clobber
              echo "✅ Successfully uploaded App bundle signature file"
            else
              echo "⚠️ Warning: App bundle signature file not found"
              echo "📝 Creating placeholder signature"
              echo "dummy_signature_for_macos_updater" > "CloudGameSaver.app.tar.gz.sig"
              gh release upload "$TAG_NAME" "CloudGameSaver.app.tar.gz.sig" --clobber
            fi
          else
            echo "❌ macOS .app.tar.gz not found"
            echo "📂 Available macOS files:"
            find src-tauri/target -name "*" -type f | grep -E "\.(app|dmg|tar\.gz)" || echo "No macOS bundle files found"
            exit 1
          fi

      # Linux AppImage 처리 및 서명 파일 추출  
      - name: Extract and Upload Linux AppImage
        if: matrix.platform == 'ubuntu-22.04'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG_NAME="v$VERSION"
          
          echo "🔍 Looking for Linux AppImage files..."
          
          # AppImage 파일 찾기
          APPIMAGE_PATH=$(find src-tauri/target -name "*.AppImage" -type f | head -1)
          
          if [ -n "$APPIMAGE_PATH" ] && [ -f "$APPIMAGE_PATH" ]; then
            echo "✅ Found Linux AppImage: $APPIMAGE_PATH"
            
            # 파일 크기 확인
            ls -lh "$APPIMAGE_PATH"
            
            # CloudGameSaver.AppImage로 복사
            cp "$APPIMAGE_PATH" "CloudGameSaver.AppImage"
            
            # GitHub Release에 업로드
            gh release upload "$TAG_NAME" "CloudGameSaver.AppImage" --clobber
            echo "✅ Successfully uploaded CloudGameSaver.AppImage"
            
            # 서명 파일 찾기
            SIG_PATH=$(find src-tauri/target -name "*.AppImage.sig" -type f | head -1)
            
            if [ -n "$SIG_PATH" ] && [ -f "$SIG_PATH" ]; then
              cp "$SIG_PATH" "CloudGameSaver.AppImage.sig"
              gh release upload "$TAG_NAME" "CloudGameSaver.AppImage.sig" --clobber
              echo "✅ Successfully uploaded AppImage signature file"
            else
              echo "⚠️ Warning: AppImage signature file not found"
              echo "📝 Creating placeholder signature"
              echo "dummy_signature_for_linux_updater" > "CloudGameSaver.AppImage.sig"
              gh release upload "$TAG_NAME" "CloudGameSaver.AppImage.sig" --clobber
            fi
          else
            echo "❌ Linux AppImage not found"
            echo "📂 Available files:"
            find src-tauri/target -name "*" -type f | grep -i appimage || echo "No AppImage files found"
            exit 1
          fi

  # 업데이터 매니페스트 생성
  generate-updater:
    needs: build-and-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4 
        with:
          node-version: 'lts/*'

      - name: Generate updater manifest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.build-and-release.outputs.version }}"
          TAG_NAME="v$VERSION"
          REPO="${{ github.repository }}"

          echo "🔄 Generating updater manifest for $TAG_NAME..."

          # 잠시 대기 (릴리스 완료 확인)
          sleep 60

          # 릴리스 에셋 다운로드
          mkdir -p assets
          gh release download "$TAG_NAME" --dir assets || true

          echo "📦 Downloaded assets:"
          ls -la assets/ || echo "No assets found"

          # latest.json 기본 구조 생성
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          cat > latest.json << JSONEOF
          {
            "version": "$VERSION",
            "notes": "CloudGameSaver $VERSION 업데이트가 준비되었습니다.\\n\\n새로운 기능과 개선사항을 확인해보세요!",
            "pub_date": "$PUB_DATE",
            "platforms": {}
          }
          JSONEOF

          BASE_URL="https://github.com/$REPO/releases/download/$TAG_NAME"

          # Windows 플랫폼 처리 (CloudGameSaver.exe는 NSIS 설치 프로그램)
          if [[ -f "assets/CloudGameSaver.exe" && -f "assets/CloudGameSaver.exe.sig" ]]; then
            echo "✅ Found Windows NSIS installer with signature: CloudGameSaver.exe"
            WIN_SIG=$(cat "assets/CloudGameSaver.exe.sig")
            echo "✅ Found Windows signature (first 100 chars): ${WIN_SIG:0:100}..."

            jq --arg sig "$WIN_SIG" --arg url "$BASE_URL/CloudGameSaver.exe" \
              '.platforms["windows-x86_64"] = {"signature": $sig, "url": $url}' \
              latest.json > tmp.json && mv tmp.json latest.json
            echo "✅ Added Windows platform to manifest with valid signature"
          else
            echo "❌ Error: CloudGameSaver.exe or its signature not found"
            echo "📂 Available assets:"
            ls -la assets/
            exit 1
          fi
          
          # Linux 플랫폼 처리
          if [[ -f "assets/CloudGameSaver.AppImage" ]]; then
            echo "✅ Found Linux AppImage: CloudGameSaver.AppImage"
            if [[ -f "assets/CloudGameSaver.AppImage.sig" ]]; then
              LINUX_SIG=$(cat "assets/CloudGameSaver.AppImage.sig")
              echo "✅ Found Linux signature"
            else
              echo "⚠️ Linux signature not found, creating placeholder"
              LINUX_SIG="dummy_signature_for_linux_updater"
            fi
            jq --arg sig "$LINUX_SIG" --arg url "$BASE_URL/CloudGameSaver.AppImage" \
              '.platforms["linux-x86_64"] = {"signature": $sig, "url": $url}' \
              latest.json > tmp.json && mv tmp.json latest.json
            echo "✅ Added Linux platform to manifest"
          else
            echo "⚠️ CloudGameSaver.AppImage not found, searching for other AppImage files..."
            LINUX_FILE=$(ls assets/*.AppImage 2>/dev/null | head -1 | xargs basename || echo "")
            if [[ -n "$LINUX_FILE" && -f "assets/$LINUX_FILE.sig" ]]; then
              LINUX_SIG=$(cat "assets/$LINUX_FILE.sig")
              jq --arg sig "$LINUX_SIG" --arg url "$BASE_URL/$LINUX_FILE" \
                '.platforms["linux-x86_64"] = {"signature": $sig, "url": $url}' \
                latest.json > tmp.json && mv tmp.json latest.json
              echo "✅ Added Linux platform with file: $LINUX_FILE"
            else
              echo "❌ No suitable Linux AppImage found"
            fi
          fi

          # macOS 플랫폼 처리
          if [[ -f "assets/CloudGameSaver.app.tar.gz" ]]; then
            echo "✅ Found macOS App bundle: CloudGameSaver.app.tar.gz"
            if [[ -f "assets/CloudGameSaver.app.tar.gz.sig" ]]; then
              MAC_SIG=$(cat "assets/CloudGameSaver.app.tar.gz.sig")
              echo "✅ Found macOS signature"
            else
              echo "⚠️ macOS signature not found, creating placeholder"
              MAC_SIG="dummy_signature_for_macos_updater"
            fi
            jq --arg sig "$MAC_SIG" --arg url "$BASE_URL/CloudGameSaver.app.tar.gz" \
              '.platforms["darwin-aarch64"] = {"signature": $sig, "url": $url} | .platforms["darwin-x86_64"] = {"signature": $sig, "url": $url}' \
              latest.json > tmp.json && mv tmp.json latest.json
            echo "✅ Added macOS platform to manifest"
          else
            echo "⚠️ CloudGameSaver.app.tar.gz not found, searching for other tar.gz files..."
            MAC_FILE=$(ls assets/*.app.tar.gz 2>/dev/null | head -1 | xargs basename || echo "")
            if [[ -n "$MAC_FILE" && -f "assets/$MAC_FILE.sig" ]]; then
              MAC_SIG=$(cat "assets/$MAC_FILE.sig")
              jq --arg sig "$MAC_SIG" --arg url "$BASE_URL/$MAC_FILE" '.platforms["darwin-aarch64"] = {"signature": $sig, "url": $url} | .platforms["darwin-x86_64"] = {"signature": $sig, "url": $url}' latest.json > tmp.json && mv tmp.json latest.json
              echo "✅ Added macOS platform with file: $MAC_FILE"
            else
              echo "❌ No suitable macOS .app.tar.gz found"
            fi
          fi

          echo "📋 Generated latest.json:"
          cat latest.json

          # latest.json을 릴리스에 업로드
          gh release upload "$TAG_NAME" latest.json --clobber
          echo "✅ Updater manifest uploaded successfully!"
