name: "Publish Release"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            target: "universal-apple-darwin"
          - platform: "ubuntu-22.04"
            target: "x86_64-unknown-linux-gnu"
          - platform: "windows-latest"
            target: "x86_64-pc-windows-msvc"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.target }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        run: npm install

      - name: Build and Publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APP_KEY: ${{ secrets.APP_KEY }}
          APP_SECRET: ${{ secrets.APP_SECRET }}
        with:
          tagName: v__VERSION__
          releaseName: "CloudGameSaver v__VERSION__"
          releaseBody: "자동으로 빌드된 릴리즈입니다."
          releaseDraft: true
          prerelease: false
          args: "--target ${{ matrix.target }}"

  updater:
    needs: publish-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install tauri-cli
        run: npm install -g @tauri-apps/cli

      - name: Get Version
        id: get_version
        run: |
          echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Generate latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          TAG_NAME="v$VERSION"
          
          mkdir -p assets
          gh release download $TAG_NAME --dir assets --clobber || true
          
          echo "=== Downloaded Assets List ==="
          ls -F assets
          
          # 1. 윈도우 파일 찾기 (.exe + .exe.sig 쌍 확인)
          for f in $(ls assets | grep -iE "\.exe$"); do
            if [ -f "assets/$f.sig" ]; then
              WIN_FILE=$f
              WIN_SIG=$(cat "assets/$f.sig")
              echo "Found Windows Asset: $f"
              break
            fi
          done

          # 2. 리눅스 파일 찾기 (.AppImage + .AppImage.sig 쌍 확인)
          for f in $(ls assets | grep -iE "\.AppImage$"); do
            if [ -f "assets/$f.sig" ]; then
              LINUX_FILE=$f
              LINUX_SIG=$(cat "assets/$f.sig")
              echo "Found Linux Asset: $f"
              break
            fi
          done

          # 3. 맥 파일 찾기 (.app.tar.gz + .sig 쌍 확인)
          for f in $(ls assets | grep -iE "\.app\.tar\.gz$"); do
            if [ -f "assets/$f.sig" ]; then
              MAC_FILE=$f
              MAC_SIG=$(cat "assets/$f.sig")
              echo "Found macOS Asset: $f"
              break
            fi
          done

          BASE_URL="https://github.com/${{ github.repository }}/releases/download/$TAG_NAME"
          
          echo "{
            \"version\": \"$VERSION\",
            \"notes\": \"CloudGameSaver $VERSION 업데이트가 준비되었습니다.\",
            \"pub_date\": \"$(date -u +"%Y-%m-%dT%H:%M:%SZ")\",
            \"platforms\": {}
          }" > latest.json

          # 각 플랫폼 정보 주입
          if [ -n "$WIN_FILE" ] && [ -n "$WIN_SIG" ]; then
            jq --arg sig "$WIN_SIG" --arg url "$BASE_URL/$WIN_FILE" '.platforms["windows-x86_64"] = {"signature": $sig, "url": $url}' latest.json > tmp.json && mv tmp.json latest.json
          fi
          if [ -n "$LINUX_FILE" ] && [ -n "$LINUX_SIG" ]; then
            jq --arg sig "$LINUX_SIG" --arg url "$BASE_URL/$LINUX_FILE" '.platforms["linux-x86_64"] = {"signature": $sig, "url": $url}' latest.json > tmp.json && mv tmp.json latest.json
          fi
          if [ -n "$MAC_FILE" ] && [ -n "$MAC_SIG" ]; then
            jq --arg sig "$MAC_SIG" --arg url "$BASE_URL/$MAC_FILE" '.platforms["darwin-aarch64"] = {"signature": $sig, "url": $url} | .platforms["darwin-x86_64"] = {"signature": $sig, "url": $url}' latest.json > tmp.json && mv tmp.json latest.json
          fi

          echo "=== Generated latest.json ==="
          cat latest.json
          
          gh release upload $TAG_NAME latest.json --clobber
