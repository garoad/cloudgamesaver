name: "Publish Release"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target universal-apple-darwin"
          - platform: "ubuntu-22.04"
            args: "--bundles appimage"
          - platform: "windows-latest"
            args: "--bundles nsis"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APP_KEY: ${{ secrets.APP_KEY }}
          APP_SECRET: ${{ secrets.APP_SECRET }}
        with:
          tagName: v__VERSION__
          releaseName: "CloudGameSaver v__VERSION__"
          releaseBody: "자동으로 빌드된 릴리즈입니다."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  updater:
    needs: publish-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install tauri-cli
        run: npm install -g @tauri-apps/cli

      - name: Get Version
        id: get_version
        run: |
          echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Generate latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          TAG_NAME="v$VERSION"
          
          # 자산 다운로드 (서명 파일들 확인용)
          mkdir -p assets
          gh release download $TAG_NAME --pattern "*.sig" --dir assets || true
          gh release download $TAG_NAME --pattern "*.zip" --dir assets || true
          gh release download $TAG_NAME --pattern "*.tar.gz" --dir assets || true
          
          # 각 플랫폼별 파일명 및 서명 추출
          WIN_FILE=$(ls assets | grep -E "nsis\.zip$" | head -n 1)
          LINUX_FILE=$(ls assets | grep -E "AppImage\.tar\.gz$" | head -n 1)
          MAC_ARM_FILE=$(ls assets | grep -E "aarch64\.app\.tar\.gz$" | head -n 1)
          MAC_X64_FILE=$(ls assets | grep -E "x64\.app\.tar\.gz$" | head -n 1)

          # 서명 내용 읽기
          WIN_SIG=$(cat assets/$WIN_FILE.sig 2>/dev/null || echo "")
          LINUX_SIG=$(cat assets/$LINUX_FILE.sig 2>/dev/null || echo "")
          MAC_ARM_SIG=$(cat assets/$MAC_ARM_FILE.sig 2>/dev/null || echo "")
          MAC_X64_SIG=$(cat assets/$MAC_X64_FILE.sig 2>/dev/null || echo "")

          # JSON 생성 (Tauri 2.0 규격 준수)
          # 'version' 값은 'v' 없이 숫자만 들어가는 것이 일반적입니다.
          cat <<EOF > latest.json
          {
            "version": "$VERSION",
            "notes": "CloudGameSaver $VERSION 업데이트가 준비되었습니다.",
            "pub_date": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "platforms": {
              "windows-x86_64": {
                "signature": "$WIN_SIG",
                "url": "https://github.com/${{ github.repository }}/releases/download/$TAG_NAME/$WIN_FILE"
              },
              "linux-x86_64": {
                "signature": "$LINUX_SIG",
                "url": "https://github.com/${{ github.repository }}/releases/download/$TAG_NAME/$LINUX_FILE"
              },
              "darwin-aarch64": {
                "signature": "$MAC_ARM_SIG",
                "url": "https://github.com/${{ github.repository }}/releases/download/$TAG_NAME/$MAC_ARM_FILE"
              },
              "darwin-x86_64": {
                "signature": "$MAC_X64_SIG",
                "url": "https://github.com/${{ github.repository }}/releases/download/$TAG_NAME/$MAC_X64_FILE"
              }
            }
          }
          EOF
          
          gh release upload $TAG_NAME latest.json --clobber

