name: "Publish Release"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target universal-apple-darwin"
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        run: npm install

      - name: Build and Publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APP_KEY: ${{ secrets.APP_KEY }}
          APP_SECRET: ${{ secrets.APP_SECRET }}
        with:
          tagName: v__VERSION__
          releaseName: "CloudGameSaver v__VERSION__"
          releaseBody: "자동으로 빌드된 릴리즈입니다."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: "[DEBUG] List Generated Files"
        shell: bash
        run: |
          echo "=== Listing all files in src-tauri/target/release/bundle ==="
          find src-tauri/target -name "bundle" -type d -exec find {} -maxdepth 3 \; || echo "No bundle directory found"

  updater:
    needs: publish-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install tauri-cli
        run: npm install -g @tauri-apps/cli

      - name: Get Version
        id: get_version
        run: |
          echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Generate latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          TAG_NAME="v$VERSION"
          
          echo "Waiting for assets to settle..."
          sleep 30
          
          mkdir -p assets
          gh release download $TAG_NAME --dir assets --clobber || echo "No assets found yet"
          
          echo "--- All Downloaded Assets ---"
          ls -R assets
          echo "----------------------------"

          # 유연한 패턴 매칭
          WIN_FILE=$(ls assets | grep -iE "\.nsis\.zip$|\.msi\.zip$|\.zip$" | grep -iv "source" | head -n 1 || echo "")
          LINUX_FILE=$(ls assets | grep -iE "\.AppImage\.tar\.gz$|\.AppImage$" | head -n 1 || echo "")
          MAC_FILE=$(ls assets | grep -iE "\.app\.tar\.gz$" | head -n 1 || echo "")

          echo "DEBUG: Detected WIN_FILE=$WIN_FILE"
          echo "DEBUG: Detected LINUX_FILE=$LINUX_FILE"
          echo "DEBUG: Detected MAC_FILE=$MAC_FILE"

          # 서명 파일 검색 및 내용 읽기
          WIN_SIG=$(cat assets/$WIN_FILE.sig 2>/dev/null || echo "")
          LINUX_SIG=$(cat assets/$LINUX_FILE.sig 2>/dev/null || echo "")
          MAC_SIG=$(cat assets/$MAC_FILE.sig 2>/dev/null || echo "")

          echo "DEBUG: WIN_SIG_LENGTH=${#WIN_SIG}"
          echo "DEBUG: LINUX_SIG_LENGTH=${#LINUX_SIG}"
          echo "DEBUG: MAC_SIG_LENGTH=${#MAC_SIG}"

          BASE_URL="https://github.com/${{ github.repository }}/releases/download/$TAG_NAME"
          
          # JSON 빌드
          echo "{
            \"version\": \"$VERSION\",
            \"notes\": \"CloudGameSaver $VERSION 업데이트가 준비되었습니다.\",
            \"pub_date\": \"$(date -u +"%Y-%m-%dT%H:%M:%SZ")\",
            \"platforms\": {}
          }" > latest.json

          # 각 플랫폼 추가 (파일이 있을 때만)
          if [ -n "$WIN_FILE" ]; then
            jq --arg sig "$WIN_SIG" --arg url "$BASE_URL/$WIN_FILE" '.platforms["windows-x86_64"] = {"signature": $sig, "url": $url}' latest.json > tmp.json && mv tmp.json latest.json
          fi
          if [ -n "$LINUX_FILE" ]; then
            jq --arg sig "$LINUX_SIG" --arg url "$BASE_URL/$LINUX_FILE" '.platforms["linux-x86_64"] = {"signature": $sig, "url": $url}' latest.json > tmp.json && mv tmp.json latest.json
          fi
          if [ -n "$MAC_FILE" ]; then
            jq --arg sig "$MAC_SIG" --arg url "$BASE_URL/$MAC_FILE" '.platforms["darwin-aarch64"] = {"signature": $sig, "url": $url} | .platforms["darwin-x86_64"] = {"signature": $sig, "url": $url}' latest.json > tmp.json && mv tmp.json latest.json
          fi

          echo "--- Final latest.json ---"
          cat latest.json
          echo "------------------------"
          
          gh release upload $TAG_NAME latest.json --clobber
