name: "Publish Release"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target universal-apple-darwin"
          - platform: "ubuntu-22.04"
            args: "--target x86_64-unknown-linux-gnu"
          - platform: "windows-latest"
            args: "--target x86_64-pc-windows-msvc"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || (matrix.platform == 'windows-latest' && 'x86_64-pc-windows-msvc' || 'x86_64-unknown-linux-gnu') }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        run: npm install

      - name: Verify Secret Presence
        shell: bash
        run: |
          if [ -n "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" ]; then
            echo "SIGNING_KEY is present (Length: ${#${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}})"
          else
            echo "::error::SIGNING_KEY IS MISSING IN SECRETS!"
          fi

      - name: Build and Publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APP_KEY: ${{ secrets.APP_KEY }}
          APP_SECRET: ${{ secrets.APP_SECRET }}
        with:
          tagName: v__VERSION__
          releaseName: "CloudGameSaver v__VERSION__"
          releaseBody: "자동으로 빌드된 릴리즈입니다."
          releaseDraft: true
          prerelease: false
          args: "--verbose ${{ matrix.args }}" # 상세 로그 활성화

      - name: "[DEBUG] Absolute Path Scan"
        shell: bash
        run: |
          echo "=== Scanning for any .sig or .zip files ==="
          find src-tauri/target -name "*.sig" -o -name "*.zip" -o -name "*.tar.gz"

  updater:
    needs: publish-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install tauri-cli
        run: npm install -g @tauri-apps/cli

      - name: Get Version
        id: get_version
        run: |
          echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Generate latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          TAG_NAME="v$VERSION"
          
          echo "Waiting for assets (90s)..."
          sleep 90
          
          mkdir -p assets
          gh release download $TAG_NAME --dir assets --clobber || true
          
          echo "=== Final Asset List ==="
          ls -R assets
          
          # 파일 찾기 (로그에 찍힌 실제 패턴 반영)
          WIN_FILE=$(ls assets | grep -iE "setup\.nsis\.zip$|msi\.zip$|\.zip$" | grep -iv "source" | head -n 1 || echo "")
          LINUX_FILE=$(ls assets | grep -iE "AppImage\.tar\.gz$" | head -n 1 || echo "")
          MAC_FILE=$(ls assets | grep -iE "app\.tar\.gz$" | head -n 1 || echo "")

          # 서명 찾기 (.sig 파일이 별도로 올라왔는지 확인)
          WIN_SIG_FILE="assets/$WIN_FILE.sig"
          LINUX_SIG_FILE="assets/$LINUX_FILE.sig"
          MAC_SIG_FILE="assets/$MAC_FILE.sig"

          WIN_SIG=$(cat "$WIN_SIG_FILE" 2>/dev/null || echo "")
          LINUX_SIG=$(cat "$LINUX_SIG_FILE" 2>/dev/null || echo "")
          MAC_SIG=$(cat "$MAC_SIG_FILE" 2>/dev/null || echo "")

          echo "DEBUG: WIN=$WIN_FILE (SIG_LEN=${#WIN_SIG})"
          echo "DEBUG: LIN=$LINUX_FILE (SIG_LEN=${#LINUX_SIG})"
          echo "DEBUG: MAC=$MAC_FILE (SIG_LEN=${#MAC_SIG})"

          BASE_URL="https://github.com/${{ github.repository }}/releases/download/$TAG_NAME"
          
          echo "{
            \"version\": \"$VERSION\",
            \"notes\": \"CloudGameSaver $VERSION 업데이트가 준비되었습니다.\",
            \"pub_date\": \"$(date -u +"%Y-%m-%dT%H:%M:%SZ")\",
            \"platforms\": {}
          }" > latest.json

          # 서명이 확보된 플랫폼만 추가
          if [ -n "$WIN_FILE" ] && [ -n "$WIN_SIG" ]; then
            jq --arg sig "$WIN_SIG" --arg url "$BASE_URL/$WIN_FILE" '.platforms["windows-x86_64"] = {"signature": $sig, "url": $url}' latest.json > tmp.json && mv tmp.json latest.json
          fi
          if [ -n "$LINUX_FILE" ] && [ -n "$LINUX_SIG" ]; then
            jq --arg sig "$LINUX_SIG" --arg url "$BASE_URL/$LINUX_FILE" '.platforms["linux-x86_64"] = {"signature": $sig, "url": $url}' latest.json > tmp.json && mv tmp.json latest.json
          fi
          if [ -n "$MAC_FILE" ] && [ -n "$MAC_SIG" ]; then
            jq --arg sig "$MAC_SIG" --arg url "$BASE_URL/$MAC_FILE" '.platforms["darwin-aarch64"] = {"signature": $sig, "url": $url} | .platforms["darwin-x86_64"] = {"signature": $sig, "url": $url}' latest.json > tmp.json && mv tmp.json latest.json
          fi

          cat latest.json
          gh release upload $TAG_NAME latest.json --clobber
