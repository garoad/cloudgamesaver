name: "Publish Release"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target universal-apple-darwin"
          - platform: "ubuntu-22.04"
            args: "" # 모든 번들(AppImage 및 Updater 자산) 빌드
          - platform: "windows-latest"
            args: "" # 모든 번들(NSIS 및 Updater 자산) 빌드

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APP_KEY: ${{ secrets.APP_KEY }}
          APP_SECRET: ${{ secrets.APP_SECRET }}
        with:
          tagName: v__VERSION__
          releaseName: "CloudGameSaver v__VERSION__"
          releaseBody: "자동으로 빌드된 릴리즈입니다."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  updater:
    needs: publish-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install tauri-cli
        run: npm install -g @tauri-apps/cli

      - name: Get Version
        id: get_version
        run: |
          echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Wait for Release Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          TAG_NAME="v$VERSION"
          echo "Waiting for assets to be ready in release $TAG_NAME..."
          sleep 30

      - name: Generate latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          TAG_NAME="v$VERSION"
          
          mkdir -p assets
          gh release download $TAG_NAME --dir assets --clobber
          
          echo "Downloaded assets list:"
          ls assets

          # 업데이트용 압축 파일 검색 (Tauri 표준 패턴)
          WIN_FILE=$(ls assets | grep -i "\.nsis\.zip$" | head -n 1 || ls assets | grep -i "\.msi\.zip$" | head -n 1 || echo "")
          LINUX_FILE=$(ls assets | grep -i "\.AppImage\.tar\.gz$" | head -n 1 || echo "")
          MAC_FILE=$(ls assets | grep -i "\.app\.tar\.gz$" | head -n 1 || echo "")

          # 서명 파일(.sig) 매칭
          WIN_SIG=$(cat assets/$WIN_FILE.sig 2>/dev/null || echo "")
          LINUX_SIG=$(cat assets/$LINUX_FILE.sig 2>/dev/null || echo "")
          MAC_SIG=$(cat assets/$MAC_FILE.sig 2>/dev/null || echo "")

          BASE_URL="https://github.com/${{ github.repository }}/releases/download/$TAG_NAME"
          
          # JSON 빌드
          echo "{
            \"version\": \"$VERSION\",
            \"notes\": \"CloudGameSaver $VERSION 업데이트가 준비되었습니다.\",
            \"pub_date\": \"$(date -u +"%Y-%m-%dT%H:%M:%SZ")\",
            \"platforms\": {}
          }" > latest.json

          # 각 플랫폼 정보 주입
          if [ -n "$WIN_FILE" ]; then
            jq --arg sig "$WIN_SIG" --arg url "$BASE_URL/$WIN_FILE" '.platforms["windows-x86_64"] = {"signature": $sig, "url": $url}' latest.json > tmp.json && mv tmp.json latest.json
          fi
          if [ -n "$LINUX_FILE" ]; then
            jq --arg sig "$LINUX_SIG" --arg url "$BASE_URL/$LINUX_FILE" '.platforms["linux-x86_64"] = {"signature": $sig, "url": $url}' latest.json > tmp.json && mv tmp.json latest.json
          fi
          if [ -n "$MAC_FILE" ]; then
            # Mac은 Universal 파일을 두 아키텍처에 공통 적용
            jq --arg sig "$MAC_SIG" --arg url "$BASE_URL/$MAC_FILE" '.platforms["darwin-aarch64"] = {"signature": $sig, "url": $url} | .platforms["darwin-x86_64"] = {"signature": $sig, "url": $url}' latest.json > tmp.json && mv tmp.json latest.json
          fi

          echo "Generated latest.json content:"
          cat latest.json
          
          gh release upload $TAG_NAME latest.json --clobber
