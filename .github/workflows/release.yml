name: "Auto Release & Update"

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - ".gitignore"
      - "LICENSE"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows-latest"
            target: "x86_64-pc-windows-msvc"
            os-name: "windows-x86_64"
            artifact-name: "CloudGameSaver.exe"
          - platform: "ubuntu-22.04" 
            target: "x86_64-unknown-linux-gnu"
            os-name: "linux-x86_64"
            artifact-name: "CloudGameSaver"
          - platform: "macos-latest"
            target: "universal-apple-darwin"
            os-name: "darwin-universal"
            artifact-name: "CloudGameSaver.app"

    runs-on: ${{ matrix.platform }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      
    steps:
      - uses: actions/checkout@v4

      - name: Get Version
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      # Node.js 캐싱
      - name: Setup Node.js with cache
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      # Rust 캐싱  
      - name: Setup Rust with cache
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      # Linux 종속성
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # 프론트엔드 종속성 설치
      - name: Install dependencies
        run: npm ci

      # Tauri 빌드 및 릴리스
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APP_KEY: ${{ secrets.APP_KEY }}
          APP_SECRET: ${{ secrets.APP_SECRET }}
        with:
          tagName: "v${{ steps.version.outputs.version }}"
          releaseName: "CloudGameSaver v${{ steps.version.outputs.version }}"
          releaseBody: |
            ## 🚀 CloudGameSaver v${{ steps.version.outputs.version }}
            
            자동으로 빌드된 최신 릴리스입니다.
            
            ### 📥 다운로드
            - Windows: CloudGameSaver.exe
            - Linux: CloudGameSaver (AppImage)  
            - macOS: CloudGameSaver.app
            
            ### 🔄 자동 업데이트
            이전 버전 사용자는 앱 내에서 자동 업데이트가 가능합니다.
          releaseDraft: false
          prerelease: false
          args: "--target ${{ matrix.target }}"
          includeDebug: false
          includeRelease: true

  # 업데이터 매니페스트 생성
  generate-updater:
    needs: build-and-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4 
        with:
          node-version: 'lts/*'

      - name: Generate updater manifest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.build-and-release.outputs.version }}"
          TAG_NAME="v$VERSION"
          
          echo "🔄 Generating updater manifest for $TAG_NAME..."
          
          # 잠시 대기 (릴리스 완료 확인)
          sleep 30
          
          # 릴리스 에셋 다운로드
          mkdir -p assets
          gh release download "$TAG_NAME" --dir assets --pattern "*.exe" --pattern "*.sig" --pattern "CloudGameSaver" --pattern "*.app" || true
          
          echo "📦 Downloaded assets:"
          ls -la assets/ || echo "No assets found"
          
          # latest.json 생성
          cat > latest.json << EOF
          {
            "version": "$VERSION",
            "notes": "CloudGameSaver $VERSION 업데이트가 준비되었습니다.\\n\\n새로운 기능과 개선사항을 확인해보세요!",
            "pub_date": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "platforms": {}
          }
          EOF

          BASE_URL="https://github.com/${{ github.repository }}/releases/download/$TAG_NAME"
          
          # Windows 플랫폼 처리
          if [[ -f "assets/CloudGameSaver.exe" && -f "assets/CloudGameSaver.exe.sig" ]]; then
            WIN_SIG=$(cat "assets/CloudGameSaver.exe.sig")
            echo "✅ Adding Windows platform"
            jq --arg sig "$WIN_SIG" --arg url "$BASE_URL/CloudGameSaver.exe" \
               '.platforms["windows-x86_64"] = {"signature": $sig, "url": $url}' \
               latest.json > tmp.json && mv tmp.json latest.json
          else
            echo "⚠️  Windows assets not found"
          fi
          
          # Linux 플랫폼 처리  
          if [[ -f "assets/CloudGameSaver" && -f "assets/CloudGameSaver.sig" ]]; then
            LINUX_SIG=$(cat "assets/CloudGameSaver.sig")
            echo "✅ Adding Linux platform"
            jq --arg sig "$LINUX_SIG" --arg url "$BASE_URL/CloudGameSaver" \
               '.platforms["linux-x86_64"] = {"signature": $sig, "url": $url}' \
               latest.json > tmp.json && mv tmp.json latest.json
          else
            echo "⚠️  Linux assets not found"
          fi
          
          # macOS 플랫폼 처리
          APP_FILE=$(ls assets/*.app 2>/dev/null | head -1 | xargs basename || echo "")
          if [[ -n "$APP_FILE" && -f "assets/$APP_FILE.sig" ]]; then
            MAC_SIG=$(cat "assets/$APP_FILE.sig")
            echo "✅ Adding macOS platform"
            jq --arg sig "$MAC_SIG" --arg url "$BASE_URL/$APP_FILE" \
               '.platforms["darwin-aarch64"] = {"signature": $sig, "url": $url} | 
                .platforms["darwin-x86_64"] = {"signature": $sig, "url": $url}' \
               latest.json > tmp.json && mv tmp.json latest.json
          else
            echo "⚠️  macOS assets not found"
          fi

          echo "📋 Generated latest.json:"
          cat latest.json
          
          # latest.json을 릴리스에 업로드
          gh release upload "$TAG_NAME" latest.json --clobber
          echo "✅ Updater manifest uploaded successfully!"
